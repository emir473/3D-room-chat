<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Multiplayer Chat Room</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; width: 280px; background: rgba(20, 20, 20, 0.85); color: white; padding: 20px; border-radius: 12px; border: 2px solid #00fff0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        #joinBtn { display: none; width: 100%; padding: 12px; background: #00fff0; border: none; font-weight: bold; margin-top: 12px; cursor: pointer; color: black; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        #joinBtn:hover { background: #00cccc; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; box-sizing: border-box; border-radius: 6px; border: none; font-size: 14px; }
        input[type="text"] { background: #333; color: white; border: 1px solid #555; }
        button { background: #00fff0; color: black; font-weight: bold; cursor: pointer; }
        #chatBox { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 220px; background: rgba(20, 20, 20, 0.85); border: 1px solid #444; border-radius: 10px; display: none; flex-direction: column; padding: 12px; z-index: 100; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        #messages { flex: 1; overflow-y: auto; font-size: 14px; margin-bottom: 8px; padding-right: 5px; }
        #chatInput { width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 6px; box-sizing: border-box; }
        #typing { font-size: 12px; color: #00fff0; height: 15px; margin-bottom: 4px; font-style: italic; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Generating ID...</div>
        <input type="text" id="peerId" placeholder="Friend's 6-Digit ID">
        <button onclick="connect()">Connect</button>
        <button id="joinBtn" onclick="joinRoom(true)">Join 3D Room &#128172;</button>
    </div>

    <div id="chatBox">
        <div id="messages"></div>
        <div id="typing"></div>
        <input type="text" id="chatInput" placeholder="Type a message... (Press Enter)">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // WEB AUDIO API SYNTHESIZER SETUP
        let audioCtx = null;
        let bgInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Klingeln / Pling bei eingehender Nachricht
        function playMessageSound() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
                
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime); // Sound etwas kräftiger
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } catch(e) { console.log(e); }
        }

        // Neue, bessere Melodie-Logik mit tiefer Vibe-Frequenz und höherer Lautstärke
        function startChillMusic() {
            try {
                initAudio();
                
                // Schöne Akkord-Frequenzen (eine Oktave tiefer für die perfekte Tiefe)
                // Kombinationen aus Am, F, C, G Vibe-Noten
                const chords = [
                    [220.00, 261.63, 329.63], // A-Moll Vibe
                    [174.61, 261.63, 349.23], // F-Dur Vibe
                    [261.63, 329.63, 392.00], // C-Dur Vibe
                    [196.00, 293.66, 392.00]  // G-Dur Vibe
                ];
                let chordIndex = 0;
                
                bgInterval = setInterval(() => {
                    if (!audioCtx || audioCtx.state === 'suspended') return;
                    
                    // Wähle den aktuellen Akkord und wechsle ihn für eine echte Song-Struktur ab
                    const currentChord = chords[chordIndex];
                    chordIndex = (chordIndex + 1) % chords.length;
                    
                    // Spiele alle 3 Noten des Akkords gleichzeitig für einen fetten Sound
                    currentChord.forEach((note, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        
                        osc.type = 'sine';
                        // Getroffene Note wird leicht zeitversetzt (Arpeggio) und tief abgespielt
                        osc.frequency.setValueAtTime(note / 2, audioCtx.currentTime + (i * 0.15)); 
                        
                        gain.gain.setValueAtTime(0.0, audioCtx.currentTime);
                        // LAUTSTÄRKE ERHÖHT: von 0.06 auf 0.25 erhöht, damit es auf Stufe 1 gut hörbar ist!
                        gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.6); 
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.5); 
                        
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        
                        osc.start();
                        osc.stop(audioCtx.currentTime + 3.8);
                    });
                    
                }, 3000); // Alle 3 Sekunden wechselt die Hintergrund-Harmonie
            } catch(e) { console.log(e); }
        }

        // Automatisches Einfrieren / Pausieren, wenn der Tab gewechselt wird
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && audioCtx) {
                audioCtx.suspend();
            } else if (!document.hidden && audioCtx) {
                audioCtx.resume();
            }
        });

        // 1. 3D WORLD & LIVING ROOM SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd4a373);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const warmLight = new THREE.DirectionalLight(0xffeacc, 0.3);
        warmLight.position.set(5, 8, 5);
        scene.add(warmLight);

        const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x00fff0, wireframe: true}));
        scene.add(cube);
        camera.position.z = 4;

        let player1Mesh, player2Mesh;
        let animationTime = 0;

        function animate() { 
            requestAnimationFrame(animate); 
            
            if(cube && scene.children.includes(cube)) {
                cube.rotation.x += 0.01; 
                cube.rotation.y += 0.01; 
            }
            
            animationTime += 0.04;
            let breatheY = Math.sin(animationTime) * 0.025;
            let breatheScale = 1 + Math.sin(animationTime) * 0.015;

            if (player1Mesh) {
                player1Mesh.position.y = 0.5 + breatheY;
                player1Mesh.scale.set(breatheScale, breatheScale, breatheScale);
            }
            if (player2Mesh) {
                player2Mesh.position.y = 0.5 + breatheY;
                player2Mesh.scale.set(breatheScale, breatheScale, breatheScale);
            }

            renderer.render(scene, camera); 
        }
        animate();

        // 2. NETWORK (PEERJS) LOGIC
        const shortId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(shortId);
        let conn, isHost = false;
        
        peer.on('open', id => {
            document.getElementById('status').innerHTML = 'Your ID: <b style="color:#00fff0; font-size:16px;">' + id + '</b>';
        });

        function connect() {
            const id = document.getElementById('peerId').value.trim();
            if(!id) return alert("Please enter a valid ID!");
            document.getElementById('status').innerText = 'Connecting...';
            conn = peer.connect(id);
            isHost = false;
            setupConnection();
        }

        peer.on('connection', c => { 
            conn = c; 
            isHost = true; 
            setupConnection(); 
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = 'Connected!';
                document.getElementById('joinBtn').style.display = 'block';
                
                conn.on('data', data => {
                    if (data === 'JOIN_ROOM') {
                        joinRoom(false);
                    } else if (data.type === 'chat') {
                        addMessage('Friend', data.text);
                        showBubble('Friend', data.text);
                        playMessageSound();
                    } else if (data.type === 'typing') {
                        document.getElementById('typing').innerText = data.text ? 'Friend is typing...' : '';
                    }
                });
            });
        }

        // 3. LIVING ROOM CREATION
        function createLabel(text, isBubble = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            if(isBubble) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.roundRect(10, 10, 492, 108, 20);
                ctx.fill();
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#111111';
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.roundRect(100, 30, 312, 68, 12);
                ctx.fill();
                ctx.font = 'bold 28px Arial';
                ctx.fillStyle = '#ffffff';
            }
            
            ctx.textAlign = 'center';
            ctx.fillText(text, 256, 74);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(2.5, 0.6, 1);
            return sprite;
        }

        function createCharacter(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({color: color, roughness: 0.3}));
            group.add(body);
            
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xffffff});
            const pupilMat = new THREE.MeshBasicMaterial({color: 0x000000});
            const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
            
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.18, 0.15, 0.42);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.18, 0.15, 0.42);
            const leftPupil = new THREE.Mesh(eyeGeo, pupilMat); leftPupil.scale.set(0.5,0.5,0.5); leftPupil.position.set(-0.18, 0.15, 0.48);
            const rightPupil = new THREE.Mesh(eyeGeo, pupilMat); rightPupil.scale.set(0.5,0.5,0.5); rightPupil.position.set(0.18, 0.15, 0.48);
            
            group.add(leftEye, rightEye, leftPupil, rightPupil);
            return group;
        }

        function joinRoom(shouldSendSignal) {
            if (shouldSendSignal && conn) {
                conn.send('JOIN_ROOM');
            }

            scene.remove(cube);
            startChillMusic();
            
            const floorMat = new THREE.MeshStandardMaterial({color: 0x5c4033, roughness: 0.7});
            const floor = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 10), floorMat);
            floor.position.y = -0.1;
            scene.add(floor);

            const carpetMat = new THREE.MeshStandardMaterial({color: 0x990000, roughness: 0.9});
            const carpet = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.02, 3.5), carpetMat);
            carpet.position.set(0, 0.01, 0);
            scene.add(carpet);

            const wallMat = new THREE.MeshStandardMaterial({color: 0xe67e22, roughness: 0.6});
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 0.2), wallMat);
            backWall.position.set(0, 3, -5);
            scene.add(backWall);
            
            const skyMat = new THREE.MeshBasicMaterial({color: 0x5dade2});
            const sky = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), skyMat);
            sky.position.set(0, 3.5, -4.95);
            scene.add(sky);

            const windowGroup = new THREE.Group();
            windowGroup.position.set(0, 3.5, -4.9);

            const glassMat = new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.3, roughness: 0.1});
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), glassMat);
            windowGroup.add(glass);

            const frameMat = new THREE.MeshStandardMaterial({color: 0xffffff});
            const borderTopBot = new THREE.Mesh(new THREE.BoxGeometry(3.1, 0.1, 0.15), frameMat); borderTopBot.position.set(0, 1, 0); windowGroup.add(borderTopBot);
            const borderTopBot2 = new THREE.Mesh(new THREE.BoxGeometry(3.1, 0.1, 0.15), frameMat); borderTopBot2.position.set(0, -1, 0); windowGroup.add(borderTopBot2);
            const borderLeftRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.1, 0.15), frameMat); borderLeftRight.position.set(1.5, 0, 0); windowGroup.add(borderLeftRight);
            const borderLeftRight2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.1, 0.15), frameMat); borderLeftRight2.position.set(-1.5, 0, 0); windowGroup.add(borderLeftRight2);

            const horizBar = new THREE.Mesh(new THREE.BoxGeometry(3, 0.08, 0.1), frameMat); windowGroup.add(horizBar);
            const vertBar = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2, 0.1), frameMat); windowGroup.add(vertBar);
            scene.add(windowGroup);

            const lampGroup = new THREE.Group();
            lampGroup.position.set(0, 6, 0);

            const wireMat = new THREE.MeshBasicMaterial({color: 0x111111});
            const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.8), wireMat); wire.position.y = -0.9; lampGroup.add(wire);

            const bulbMat = new THREE.MeshBasicMaterial({color: 0xfff2cc});
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), bulbMat); bulb.position.y = -1.8; lampGroup.add(bulb);
            scene.add(lampGroup);

            const spotLight = new THREE.SpotLight(0xfff2cc, 3.5, 10, Math.PI / 4, 0.5, 1);
            spotLight.position.set(0, 4.2, 0);
            spotLight.target.position.set(0, 0, 0);
            scene.add(spotLight);
            scene.add(spotLight.target);

            const table = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.6, 1.8), new THREE.MeshStandardMaterial({color: 0x4a2c11, roughness: 0.5}));
            table.position.set(0, 0.3, 0);
            scene.add(table);

            camera.position.set(0, 3.5, 6.5);
            camera.lookAt(0, 0.8, 0);

            let p1LabelText = isHost ? "You" : "Friend";
            let p2LabelText = isHost ? "Friend" : "You";
            
            player1Mesh = createCharacter(0x0055ff);
            player1Mesh.position.set(-2.3, 0.5, 0);
            player1Mesh.lookAt(0, 0.5, 0);
            
            const p1Label = createLabel(p1LabelText); p1Label.position.y = 0.85; player1Mesh.add(p1Label);
            scene.add(player1Mesh);

            player2Mesh = createCharacter(0xff2233);
            player2Mesh.position.set(2.3, 0.5, 0);
            player2Mesh.lookAt(0, 0.5, 0);
            
            const p2Label = createLabel(p2LabelText); p2Label.position.y = 0.85; player2Mesh.add(p2Label);
            scene.add(player2Mesh);
            
            document.getElementById('ui').style.display = 'none';
            document.getElementById('chatBox').style.display = 'flex';
        }

        // 4. CHAT SYSTEM
        const chatInput = document.getElementById('chatInput');
        
        chatInput.addEventListener('input', () => {
            if (conn) {
                conn.send({type: 'typing', text: chatInput.value.length > 0});
            }
        });

        chatInput.onkeypress = (e) => {
            if (e.key === 'Enter' && conn) {
                const msg = chatInput.value;
                if(!msg.trim()) return;
                
                conn.send({type: 'chat', text: msg});
                addMessage('You', msg);
                showBubble('You', msg);
                
                chatInput.value = '';
                conn.send({type: 'typing', text: false});
            }
        };

        function addMessage(sender, text) {
            const div = document.getElementById('messages');
            div.innerHTML += `<div><b>${sender}:</b> ${text}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        function showBubble(target, text) {
            let activeMesh = null;
            if(target === 'You') {
                activeMesh = isHost ? player1Mesh : player2Mesh;
            } else {
                activeMesh = isHost ? player2Mesh : player1Mesh;
            }
            
            if(!activeMesh) return;
            
            activeMesh.children.forEach(child => {
                if(child.isBubbleSprite) activeMesh.remove(child);
            });
            
            const bubbleSprite = createLabel(text, true);
            bubbleSprite.position.y = 1.4; 
            bubbleSprite.isBubbleSprite = true;
            activeMesh.add(bubbleSprite);
            
            setTimeout(() => {
                activeMesh.remove(bubbleSprite);
            }, 10000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
